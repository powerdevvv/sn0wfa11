<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN0WFA11 ScriptHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #02060a;
            --bg-secondary: #0a0f16;
            --accent-ice: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.35);
            --text-primary: #e2e8f0;
            --text-dim: #94a3b8;
            --border-ice: rgba(0, 242, 255, 0.2);
            --radius: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #ff4b4b;
            --success: #2E7D32;
            --card-bg: var(--bg-secondary);
        }

        html.theme-red-dark {
            --bg-main: #1a0000;
            --bg-secondary: #2a0000;
            --accent-ice: #B22222;
            --accent-glow: rgba(178, 34, 34, 0.4);
            --text-primary: #ffe8e8;
            --text-dim: #d67e7e;
            --border-ice: rgba(178, 34, 34, 0.2);
            --card-bg: linear-gradient(135deg, #2a0000 0%, #1a0000 100%);
            --danger: #8B0000;
            --success: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI Semibold', 'Consolas', monospace;
        }

        body {
    background: transparent !important;
    background-image: none !important;
            color: var(--text-primary);
            padding: 20px;
            padding-top: 100px;
            min-height: 100vh;
        }

        .floating-search {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(2, 6, 10, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-ice);
            padding: 15px 25px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .search-input, .filter-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-ice);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus, .filter-select:focus {
            border-color: var(--accent-ice);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .search-input {
            flex-grow: 1;
        }

        .tabs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            min-width: 140px;
            height: 42px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-ice);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .tab.active {
            background: var(--accent-ice) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--accent-glow);
            border-color: var(--accent-ice) !important;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script-card {
            background: var(--card-bg);
            border: 1px solid var(--border-ice);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .script-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-ice) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .script-image-container {
            width: 100%;
            height: 140px;
            overflow: hidden;
            position: relative;
        }

        .script-image-container::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, var(--bg-secondary), transparent);
            z-index: 1;
        }

        .script-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .script-card:hover .script-image {
            transform: scale(1.05);
        }

        .script-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-ice);
            color: #000;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .script-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .script-title {
            color: var(--accent-ice);
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .script-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .script-info i {
            color: var(--accent-ice);
            width: 16px;
        }

        .script-stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-item i {
            color: var(--accent-ice);
        }

        .btn-primary, .btn-secondary, .btn-success, #saveScriptBtn, #modalCopyButton, .remove-script-btn {
            height: 40px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            width: calc(100% - 30px);
            margin: 5px auto;
            border: none;
        }

        .btn-primary, #modalCopyButton, .script-card .btn-primary {
            background: var(--accent-ice) !important;
            color: #000 !important;
        }

        .btn-secondary, #saveScriptBtn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-ice);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .remove-script-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--danger) !important;
            color: white !important;
            width: 28px;
            height: 28px;
            margin: 0;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 3;
        }

        .script-card:hover .remove-script-btn {
            opacity: 1;
        }

        .btn-primary:hover, #modalCopyButton:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-ice);
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 50px #000;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-title {
            color: var(--accent-ice);
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--accent-ice);
        }

        .modal-script {
            background: #000;
            color: var(--accent-ice);
            padding: 15px;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
            border: 1px solid var(--border-ice);
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent-ice);
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 800;
            z-index: 3000;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 20px var(--accent-glow);
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--accent-ice);
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.85rem;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-ice);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="modal" id="scriptModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Script Details</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-script" id="modalScriptContent">Loading script...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="saveScriptBtn">
                    <i class="fas fa-bookmark"></i>
                    Save Script
                </button>
                <button class="btn btn-primary" id="modalCopyButton">
                    <i class="fas fa-copy"></i>
                    Copy Script
                </button>
            </div>
        </div>
    </div>

    <div class="floating-search">
        <input type="text" class="search-input" placeholder="Search scripts..." id="searchInput">
        <select class="filter-select" id="scriptType">
            <option value="">All</option>
            <option value="free">Free</option>
            <option value="paid">Paid</option>
        </select>
        <select class="filter-select" id="sortBy">
            <option value="updatedAt">Recent</option>
            <option value="views">Popular</option>
        </select>
        <select class="filter-select" id="maxResults">
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="50">50</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="cloud">Cloud Scripts</div>
        <div class="tab" data-tab="saved">Saved Scripts</div>
    </div>

    <div class="content-section active" id="cloudScripts">
        <div class="scripts-grid" id="scriptsContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Loading scripts...</h3>
            </div>
        </div>
    </div>

    <div class="content-section" id="savedScripts">
        <div class="scripts-grid" id="localScriptsGrid">
            <div class="empty-state">
                <i class="fas fa-book-open"></i>
                <h3>No saved scripts</h3>
                <p>Save scripts by clicking the bookmark icon in the script modal</p>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span>Script copied!</span>
    </div>

    <script>
        let scriptsData = [];
        let currentPage = 1;
        let totalPages = 1;
        let currentScript = null;
        const proxies = [
            'https://api.codetabs.com/v1/proxy/?quest=',
            'https://thingproxy.freeboard.io/fetch/',
            'https://corsproxy.io/?'
        ];
        let currentProxy = 0;
        let currentTab = 'cloud';

        function getLocalScripts() {
            const scripts = localStorage.getItem('savedScripts');
            return scripts ? JSON.parse(scripts) : [];
        }

        function saveLocalScript(script) {
            const scripts = getLocalScripts();
            if (!scripts.some(s => s.title === script.title && s.script === script.script)) {
                scripts.push(script);
                localStorage.setItem('savedScripts', JSON.stringify(scripts));
                return true;
            }
            return false;
        }

        function removeLocalScript(index) {
            const scripts = getLocalScripts();
            scripts.splice(index, 1);
            localStorage.setItem('savedScripts', JSON.stringify(scripts));
            renderLocalScripts();
            return scripts;
        }

        function renderLocalScripts() {
            const container = document.getElementById('localScriptsGrid');
            const scripts = getLocalScripts();
            
            if (scripts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <h3>No saved scripts</h3>
                        <p>Save scripts by clicking the bookmark icon in the script modal</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            scripts.forEach((script, index) => {
                html += `
                    <div class="script-card" style="animation-delay: ${index * 0.05}s">
                        <button class="remove-script-btn" data-index="${index}">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="script-image-container">
                            <img
                                src="${script.image || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMzAwIDE4MCI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIxODAiIGZpbGw9IiMzMzMzMzMiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjE0IiBmaWxsPSIjYjBiMGIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4='}"
                                class="script-image"
                                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMzAwIDE4MCI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIxODAiIGZpbGw9IiMzMzMzMzMiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjE0IiBmaWxsPSIjYjBiMGIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5JbWFnZSBFcnJvcjwvdGV4dD48L3N2Zz4='" 
                            >
                        </div>
                        <div class="script-content">
                            <h3 class="script-title" title="${script.title}">${script.title}</h3>
                            <p class="script-info">
                                <i class="fas fa-gamepad"></i>
                                ${script.game || 'No game specified'}
                            </p>
                            <div class="script-stats">
                                <div class="stat-item">
                                    <i class="fas fa-calendar-alt"></i>
                                    <span>${script.date ? new Date(script.date).toLocaleDateString() : 'N/A'}</span>
                                </div>
                            </div>
                            <button class="btn btn-primary copy-local-btn" data-index="${index}" style="width: 100%; margin-top: auto;">
                                <i class="fas fa-copy"></i>
                                Copy Script
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            document.querySelectorAll('#localScriptsGrid .copy-local-btn').forEach(btn => {
                btn.addEventListener('click', handleLocalCopy);
            });
            document.querySelectorAll('.remove-script-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = btn.dataset.index;
                    removeLocalScript(index);
                    showMessage('Script removed from your collection');
                });
            });
            document.querySelectorAll('#localScriptsGrid .script-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
                    const index = Array.from(card.parentElement.children).indexOf(card);
                    openScriptModal(index, true);
                });
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.toggle('active', section.id === `${tab}Scripts`);
            });
            if (tab === 'saved') renderLocalScripts();
        }

        async function fetchWithRetry(url, retries = 3) {
            try {
                const proxyUrl = proxies[currentProxy] + encodeURIComponent(url);
                const response = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    currentProxy = (currentProxy + 1) % proxies.length;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    return fetchWithRetry(url, retries - 1);
                }
                throw error;
            }
        }

        async function loadScripts(search = '', page = 1) {
            const container = document.getElementById('scriptsContainer');
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><h3>Loading scripts...</h3></div>';
            
            try {
                const scriptType = document.getElementById('scriptType').value;
                const sortBy = document.getElementById('sortBy').value;
                const maxResults = document.getElementById('maxResults').value;
                
                let apiUrl;
                if (search) {
                    apiUrl = `https://scriptblox.com/api/script/search?q=${encodeURIComponent(search)}&page=${page}&max=${maxResults}`;
                } else {
                    apiUrl = `https://scriptblox.com/api/script/fetch?page=${page}&max=${maxResults}`;
                }
                if (scriptType) apiUrl += `&mode=${scriptType}`;
                if (sortBy) apiUrl += `&sortBy=${sortBy}`;
                
                let data;
                try {
                    const response = await fetch(apiUrl);
                    data = await response.json();
                } catch (directError) {
                    console.log('Direct fetch failed, using proxy...');
                    data = await fetchWithRetry(apiUrl);
                }
                
                if (data && data.result && data.result.scripts) {
                    scriptsData = data.result.scripts;
                    totalPages = data.result.totalPages || 1;
                } else if (data && Array.isArray(data)) {
                    scriptsData = data;
                    totalPages = 1;
                } else {
                    scriptsData = [];
                    totalPages = 1;
                }
                currentPage = page;
                renderScripts();
            } catch (error) {
                console.error(error);
                showMessage(`Error: ${error.message}`);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Failed to load scripts</h3>
                        <p>Check your connection and try again.</p>
                    </div>
                `;
            }
        }

        function renderScripts() {
            const container = document.getElementById('scriptsContainer');
            if (scriptsData.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>No scripts found</h3><p>Try different filters.</p></div>`;
                return;
            }
            
            let html = '';
            scriptsData.forEach((script, index) => {
                const imageUrl = script.image ? (script.image.startsWith('http') ? script.image : `https://scriptblox.com${script.image}`) : 
                    'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMzAwIDE4MCI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIxODAiIGZpbGw9IiMyNTI1MjUiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjE0IiBmaWxsPSIjYjBiMGIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4=';
                html += `
                    <div class="script-card" data-index="${index}">
                        ${script.paid ? '<span class="script-badge">Premium</span>' : ''}
                        <div class="script-image-container">
                            <img src="${imageUrl}" class="script-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMzAwIDE4MCI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIxODAiIGZpbGw9IiMyNTI1MjUiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjE0IiBmaWxsPSIjYjBiMGIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5JbWFnZSBFcnJvcjwvdGV4dD48L3N2Zz4='">
                        </div>
                        <div class="script-content">
                            <h3 class="script-title" title="${script.title}">${script.title}</h3>
                            <p class="script-info"><i class="fas fa-gamepad"></i> ${script.game?.name || 'No game specified'}</p>
                            <div class="script-stats">
                                <div class="stat-item"><i class="fas fa-eye"></i> <span>${script.views?.toLocaleString() || 'N/A'}</span></div>
                                <div class="stat-item"><i class="fas fa-thumbs-up"></i> <span>${script.likeCount?.toLocaleString() || 'N/A'}</span></div>
                                <div class="stat-item"><i class="fas fa-calendar-alt"></i> <span>${script.updatedAt ? new Date(script.updatedAt).toLocaleDateString() : 'N/A'}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.querySelectorAll('.script-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
                    const idx = card.dataset.index;
                    openScriptModal(idx);
                });
            });
        }

        function openScriptModal(index, isLocal = false) {
            let script;
            if (isLocal) {
                const scripts = getLocalScripts();
                script = scripts[index];
                currentScript = { ...script, isLocal: true, localIndex: index };
            } else {
                script = scriptsData[index];
                currentScript = { ...script, isLocal: false, index: index };
            }
            if (!script) return;
            
            const modal = document.getElementById('scriptModal');
            document.getElementById('modalTitle').textContent = script.title;
            document.getElementById('modalScriptContent').textContent = script.script || 'No script content available';
            
            const scriptsSaved = getLocalScripts();
            const isSaved = scriptsSaved.some(s => s.title === script.title && s.script === script.script);
            const saveBtn = document.getElementById('saveScriptBtn');
            if (isSaved) {
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';
                saveBtn.classList.add('btn-success');
                saveBtn.classList.remove('btn-secondary');
            } else {
                saveBtn.innerHTML = '<i class="fas fa-bookmark"></i> Save Script';
                saveBtn.classList.add('btn-secondary');
                saveBtn.classList.remove('btn-success');
            }
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            document.getElementById('modalCopyButton').onclick = () => {
                navigator.clipboard.writeText(script.script).then(() => showMessage('Script copied to clipboard!')).catch(() => showMessage('Failed to copy'));
            };
        }

        function closeScriptModal() {
            const modal = document.getElementById('scriptModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            currentScript = null;
        }

        function saveCurrentScript() {
            if (!currentScript) return;
            const scriptToSave = {
                title: currentScript.title,
                script: currentScript.script,
                game: currentScript.game?.name || 'No game specified',
                image: currentScript.image,
                date: new Date().toISOString()
            };
            const saved = saveLocalScript(scriptToSave);
            const saveBtn = document.getElementById('saveScriptBtn');
            if (saved) {
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';
                saveBtn.classList.add('btn-success');
                saveBtn.classList.remove('btn-secondary');
                showMessage('Script saved to your collection!');
                if (currentTab === 'saved') renderLocalScripts();
            } else {
                showMessage('Already in your collection');
            }
        }

        function handleLocalCopy(event) {
            event.stopPropagation();
            const index = event.currentTarget.dataset.index;
            const scripts = getLocalScripts();
            const script = scripts[index];
            if (!script) return showMessage('No script found');
            navigator.clipboard.writeText(script.script).then(() => {
                showMessage('Script copied!');
                const btn = event.currentTarget;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('btn-success');
                btn.classList.remove('btn-primary');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy Script';
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-success');
                }, 2000);
            }).catch(() => showMessage('Failed to copy'));
        }

        function searchScripts() {
            loadScripts(document.getElementById('searchInput').value.trim(), 1);
        }

        function showMessage(text) {
            const notif = document.getElementById('notification');
            notif.querySelector('span').textContent = text;
            notif.style.display = 'flex';
            notif.style.animation = 'none';
            void notif.offsetWidth;
            notif.style.animation = 'slideInRight 0.3s ease, fadeOut 0.3s ease 2.5s forwards';
            setTimeout(() => { if (notif.style.display === 'flex') notif.style.display = 'none'; }, 3000);
        }

        function setupFilterListeners() {
            document.getElementById('scriptType').addEventListener('change', searchScripts);
            document.getElementById('sortBy').addEventListener('change', searchScripts);
            document.getElementById('maxResults').addEventListener('change', searchScripts);
        }

        function applyTheme(themeData) {
            const html = document.documentElement;
            html.className = '';
            html.style.cssText = '';
            if (typeof themeData === 'string') {
                if (themeData !== 'default' && themeData !== 'ice') {
                    html.classList.add(`theme-${themeData}`);
                }
                if (themeData) localStorage.setItem('theme', themeData);
            } else if (typeof themeData === 'object' && themeData.type === 'custom' && themeData.colors) {
                for (const [key, value] of Object.entries(themeData.colors)) {
                    html.style.setProperty(key, value);
                }
            }
        }

        function handleMessage(data) {
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch(e) { return; }
            }
            if (data.type === "themeChange" && typeof data.theme === "string") {
                applyTheme(data.theme);
            }
        }

        function setupMessageHandlers() {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', event => handleMessage(event.data));
            }
            window.addEventListener('message', event => handleMessage(event.data));
        }

        function debounce(func, wait) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, arguments), wait);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadScripts();
            setupFilterListeners();
            
            const searchInput = document.getElementById('searchInput');
            const debouncedSearch = debounce(searchScripts, 500);
            searchInput.addEventListener('input', debouncedSearch);
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchScripts(); });
            
            document.getElementById('modalClose').addEventListener('click', closeScriptModal);
            document.getElementById('scriptModal').addEventListener('click', (e) => { if (e.target === document.getElementById('scriptModal')) closeScriptModal(); });
            document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
            document.getElementById('saveScriptBtn').addEventListener('click', saveCurrentScript);
            
            setupMessageHandlers();
            const savedTheme = localStorage.getItem('theme');
            applyTheme('ice');
        });
    </script>
</body>
</html>
