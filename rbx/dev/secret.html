<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sn0wfa11</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-language_tools.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #020408;
            --accent: #7dd3fc;
            --accent-glow: rgba(125, 211, 252, 0.4);
            --glass: rgba(10, 15, 25, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
            --danger: #ff5f56;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; background: var(--bg-deep); 
            font-family: 'Inter', -apple-system, sans-serif; color: #fff;
        }

        #snow-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .app-wrapper {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
        }

        .tabs-header {
            display: flex; align-items: center;
            background: rgba(10, 15, 25, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 40px; flex-shrink: 0; padding: 0 10px;
        }

        #tabs-list { display: flex; height: 100%; align-items: center; }

        .tab {
            padding: 0 12px 0 18px; height: 100%;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-dim); cursor: pointer;
            font-size: 12px; font-weight: 500; transition: 0.2s;
            border-right: 1px solid var(--border);
            user-select: none; position: relative;
        }

        .tab:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .tab.active {
            color: var(--accent);
            background: rgba(30, 41, 59, 0.4);
            box-shadow: inset 0 -2px 0 var(--accent);
        }

        .close-tab {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 14px;
            transition: 0.2s; opacity: 0.3;
            margin-left: 4px;
        }
        .close-tab:hover { background: rgba(255,255,255,0.1); opacity: 1; color: var(--danger); }

        .add-btn {
            background: none; border: none; color: var(--accent);
            font-size: 20px; cursor: pointer; padding: 0 15px;
            height: 100%; transition: 0.2s; opacity: 0.7;
        }
        .add-btn:hover { opacity: 1; background: rgba(125, 211, 252, 0.05); }

        .editor-container { flex-grow: 1; position: relative; }
        #editor { position: absolute; inset: 0; font-size: 14px; background: transparent !important; }

        .ace_editor, .ace_gutter, .ace_scroller, .ace_content { background: transparent !important; }
        .ace_gutter { border-right: 1px solid var(--border); color: #475569 !important; }
        .ace_keyword { color: var(--accent) !important; font-weight: bold; }
        .ace_string { color: #fef08a !important; }
        .ace_variable { color: #e2e8f0 !important; }
        .ace_marker-layer .ace_active-line { background: rgba(255,255,255,0.02) !important; }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-box {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--accent);
            border-radius: 14px; padding: 24px; width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 25px var(--accent-glow);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
        .modal-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
        
        .modal-input {
            width: 100%; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 12px 15px; color: #fff; outline: none;
            font-family: 'Fira Code', monospace; font-size: 14px;
            margin-bottom: 25px; transition: all 0.2s ease;
        }
        .modal-input:focus { border-color: var(--accent); background: rgba(125, 211, 252, 0.1); }

        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-create { background: var(--accent); color: #020617; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(255, 95, 86, 0.3); }

        .ace_editor.ace_autocomplete {
            background: rgba(15, 23, 42, 0.95) !important;
            border: 1px solid var(--accent) !important;
            backdrop-filter: blur(10px); color: #fff !important;
        }
    </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div class="app-wrapper">
    <div class="tabs-header">
        <div id="tabs-list">
            <div class="tab active" data-name="main.luau" onclick="EditorAPI.selectTab(this)">
                <span>❄ main.luau</span>
                <div class="close-tab" onclick="EditorAPI.requestCloseTab(event, 'main.luau')">×</div>
            </div>
        </div>
        <button class="add-btn" onclick="EditorAPI.openModal('file-modal')">+</button>
    </div>
    <div class="editor-container">
        <div id="editor"></div>
    </div>
</div>

<div class="modal-overlay" id="file-modal">
    <div class="modal-box">
        <div class="modal-title">New File</div>
        <input type="text" id="filename-input" class="modal-input" placeholder="filename.luau" spellcheck="false" autocomplete="off">
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="EditorAPI.closeModal('file-modal')">Cancel</button>
            <button class="btn btn-create" onclick="EditorAPI.confirmNewTab()">Create</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-box">
        <div class="modal-title" style="color: var(--danger);">Delete File?</div>
        <div class="modal-desc">Are you sure you want to delete <span id="delete-filename" style="color:#fff; font-weight:600;"></span>? This action cannot be undone.</div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="EditorAPI.closeModal('confirm-modal')">Keep it</button>
            <button class="btn btn-danger" onclick="EditorAPI.executeCloseTab()">Delete Forever</button>
        </div>
    </div>
</div>

<script>
    ace.require("ace/ext/language_tools");
    const editor = ace.edit("editor");
    
    editor.setTheme("ace/theme/tomorrow_night_eighties");
    editor.session.setMode("ace/mode/lua");
    editor.setOptions({
        fontFamily: "'Fira Code', monospace",
        enableBasicAutocompletion: true,
        enableLiveAutocompletion: true,
        showPrintMargin: false,
        useSoftTabs: true,
        tabSize: 4
    });

    window.EditorAPI = {
        tabs: { 'main.luau': '-- Welcome to sn0wfa11\nprint("Hello, World!")' },
        currentTab: 'main.luau',
        pendingDelete: null,

        getCode: () => editor.getValue(),
        setCode: (code) => editor.setValue(code, -1),

        selectTab: function(el) {
            const name = el.getAttribute('data-name');
            if (this.currentTab === name) return;
            this.tabs[this.currentTab] = editor.getValue();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            this.currentTab = name;
            editor.setValue(this.tabs[name] || '', -1);
            editor.focus();
        },

        // Вызываем окно подтверждения
        requestCloseTab: function(event, name) {
            event.stopPropagation();
            const tabElements = document.querySelectorAll('.tab');
            if (tabElements.length <= 1) return; 

            this.pendingDelete = name;
            document.getElementById('delete-filename').innerText = name;
            this.openModal('confirm-modal');
        },

        // Реальное удаление после нажатия "Delete Forever"
        executeCloseTab: function() {
            const name = this.pendingDelete;
            if (!name) return;

            const targetTab = document.querySelector(`.tab[data-name="${name}"]`);
            const isClosingCurrent = (this.currentTab === name);

            delete this.tabs[name];

            if (isClosingCurrent) {
                const nextTabEl = targetTab.nextElementSibling || targetTab.previousElementSibling;
                const nextName = nextTabEl.getAttribute('data-name');
                targetTab.remove();
                this.currentTab = nextName;
                editor.setValue(this.tabs[nextName], -1);
                document.querySelectorAll('.tab').forEach(t => {
                    if(t.getAttribute('data-name') === nextName) t.classList.add('active');
                });
            } else {
                targetTab.remove();
            }

            this.closeModal('confirm-modal');
            this.pendingDelete = null;
        },

        openModal: (id) => {
            const modal = document.getElementById(id);
            modal.classList.add('active');
            if(id === 'file-modal') {
                const input = document.getElementById('filename-input');
                input.value = "";
                input.focus();
            }
        },

        closeModal: (id) => {
            document.getElementById(id).classList.remove('active');
            this.pendingDelete = null;
        },

        confirmNewTab: function() {
            const input = document.getElementById('filename-input');
            let name = input.value.trim() || 'script.luau';
            if (!name.endsWith('.luau')) name += '.luau';
            if (this.tabs[name]) return alert("File exists!");

            this.tabs[this.currentTab] = editor.getValue();
            this.tabs[name] = `-- ${name}\n`;
            
            const tabsList = document.getElementById('tabs-list');
            const btn = document.createElement('div');
            btn.className = 'tab';
            btn.setAttribute('data-name', name);
            btn.onclick = () => this.selectTab(btn);
            btn.innerHTML = `<span>❄ ${name}</span><div class="close-tab" onclick="EditorAPI.requestCloseTab(event, '${name}')">×</div>`;
            
            tabsList.appendChild(btn);
            this.closeModal('file-modal');
            this.selectTab(btn);
        },
        
        toggleGutter: function(state) {
            this.gutter = (typeof state === 'boolean') ? state : !this.gutter;
            editor.setOption("showGutter", this.gutter);
        }
    };

    EditorAPI.setCode(EditorAPI.tabs['main.luau']);

    document.getElementById('filename-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') EditorAPI.confirmNewTab();
        if(e.key === 'Escape') EditorAPI.closeModal('file-modal');
    });

    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, flakes = [];
    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        editor.resize();
        flakes = Array.from({length: 120}, () => ({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2+1, d:Math.random()*0.6+0.2}));
    }
    function draw() {
        ctx.clearRect(0,0,w,h); ctx.fillStyle = "rgba(200,230,255,0.4)"; ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
            f.y += f.d+1; f.x += Math.sin(f.y/60)*0.5; if(f.y>h) f.y=-10;
        });
        ctx.fill(); requestAnimationFrame(draw);
    }
    //window.addEventListener('resize', resize); resize(); draw();
</script>
</body>
</html>
